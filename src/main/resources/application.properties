# app folders
app.data.folder=/data
app.tmp.folder=/data/tmp

# Retention windows (single source of truth; consumed by RedisConfig,
# DownloadStatusService, DownloadFileCleanupTask). Spring parses these
# strings as Duration — supported suffixes: d, h, m, s.
app.retention.submissions=90d
app.retention.downloads=30d
logging.file.path=${LOGGING_FILE_PATH:/data/logs}

# Chunk size used by DownloadProcessor for full downloads.
# Lower value (e.g. 1000) - more partitions and parallel tasks, faster but more overhead
# Higher value (e.g. 5000) - fewer partitions, heavier tasks, higher memory usage
csv.partition.size=4000

# Cap on processing attempts per download job. With manual ack (see
# DownloadRequestListener), a JVM crash mid-job leaves the message
# unacked and Rabbit redelivers. Without a cap, a poison payload that
# reliably crashes the BE would loop forever and brick the queue.
app.download.max-attempts=3

#server.port=8091
server.servlet.context-path=/ProtVar/api
spring.profiles.active=local

spring.servlet.multipart.maxFileSize=-1
spring.servlet.multipart.maxRequestSize=-1
# Enable http encoding support.
# Force the encoding to the configured charset on HTTP requests and responses.
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.force=true
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=30m

spring.jpa.open-in-view=false
# HikariCP settings
spring.datasource.hikari.minimum-idle=5
# Supports up to 10 concurrent (download csv)partitions × 5 jobs
# Each partition makes 5-9 DB queries, so 100 is safe headroom.
#spring.datasource.hikari.maximum-pool-size=100
spring.datasource.hikari.maximum-pool-size=50
# Reasonable wait time (60s)
spring.datasource.hikari.connection-timeout=60000
spring.datasource.hikari.idle-timeout=60000
spring.datasource.hikari.max-lifetime=1800000

spring.rabbitmq.listener.simple.acknowledge-mode=manual
#  Max num of concurrent download jobs
#spring.rabbitmq.listener.simple.concurrency=5
#spring.rabbitmq.listener.simple.max-concurrency=10
# (slower processing, more stable)
spring.rabbitmq.listener.simple.concurrency=2
spring.rabbitmq.listener.simple.max-concurrency=5
# Limit unacknowledged messages per consumer
spring.rabbitmq.listener.simple.prefetch=1

# Run actuator on its own Tomcat connector so liveness/readiness probes are
# isolated from the main request thread pool — heavy download jobs starving
# the 8080 acceptors used to flap probes and trigger SIGKILLs (exit 137).
# The management server has no servlet context-path, so the deploy probe
# paths are /actuator/health/{liveness,readiness} on 8081.
management.server.port=8081
management.endpoint.health.group.readiness.include=readinessState,db

spring.config.import=classpath:embedding.properties

protvar.datasource.jdbc-url=jdbc:postgresql://host:port/db?options=-c%20search_path=protvarwrite,public
protvar.datasource.username=provide-on-run-time
protvar.datasource.password=provide-on-run-time
protvar.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

#docs https://springdoc.org/#properties or https://swagger.io/docs/open-source-tools/swagger-ui/usage/configuration/
springdoc.api-docs.path=/docs
springdoc.swagger-ui.path=/
springdoc.swagger-ui.layout=BaseLayout
springdoc.swagger-ui.disable-swagger-default-url=true

# API URLs properties
spring.mail.host=smtp.ebi.ac.uk

logging.level.root=WARN
logging.level.uk.ac.ebi=TRACE

# Retain rotated archives long enough for the daily check-logs.sh scan to
# survive pod restarts. Defaults are 7 days / 10MB / unlimited cap.
logging.logback.rollingpolicy.max-history=14
logging.logback.rollingpolicy.max-file-size=20MB
logging.logback.rollingpolicy.total-size-cap=500MB

# name of rabbit service in the cluster
spring.rabbitmq.host=rabbit-service
spring.data.redis.host=redis-service
spring.data.redis.port=6379
# Namespace prefix for every Spring @Cacheable key (RedisConfig prepends it).
# Bump on a deploy whose @Cacheable model classes change shape — old entries
# move to the previous namespace and are invisible to the new BE, so no manual
# Redis flush. See RedisConfig.cacheManager().
cache.version=v1

# protvar-mcp base URL — overridden per env via the deploy chart's configmap
# (mcpUrl in values-{int,dev,pub,fb}.yaml) so the status check exercises the
# public-facing path (gateway included). Default points to int as the safe
# fallback for local dev / unset envs.
protvar-mcp.url=https://wwwint.ebi.ac.uk/ProtVar/mcp

uniprot.release=2025_01
ensembl.release=113

# table prefix is either the uniprot.release (e.g. 2025_01) or any other prefix used in mapping import pipeline
# (e.g. test)
#tbl.prefix=
tbl.prefix=rel_${uniprot.release}

# Not-prefixed
# not used
tbl.release=current_release

# Prefixed tables used in MappingPipeline
tbl.exon.boundary.chr=exon_boundary_chr%s
tbl.mapping=${tbl.prefix}_genomic_protein_mapping
tbl.mapping.dbsnp=mapping_dbsnp_lookup
tbl.sequence=sequence
#tbl.upentry=uniprot_entry
tbl.upentry=${tbl.prefix}_uniprot_entry

# Prefixed table used in CrossmapImport
#tbl.crossmap=crossmap
tbl.crossmap=${tbl.prefix}_crossmap

# Prefixed table used in UniprotRefseqMapper
# RefseqImport uses ensembl release used for the uniprot release
tbl.uprefseq=${tbl.prefix}_uniprot_refseq

# Prefixed table for CaddImport based on mapping release
#tbl.cadd=cadd_prediction # pre-v.14 release
tbl.cadd=${tbl.prefix}_coding_cadd

# Newly added tables for protvar-be
#tbl.clinvar=clinvar # pre-v.14 release
tbl.clinvar=clinvar_2025_02
tbl.clinvar.extended=clinvar_2025_02_extended
#tbl.cosmic=cosmic # pre-v.14 release
tbl.cosmic=cosmic_v99
#tbl.dbsnp=dbsnp # pre-v.14 release
tbl.dbsnp=dbsnp_b156
tbl.stats=stats

#tbl.foldx=afdb_foldx # pre-v.14 release (before data fix)
tbl.foldx=afdb_foldx_2025_02

# to review and update future version accordingly
tbl.pocket=pocket
tbl.pocket.v2=pocket_v2
tbl.interfaces=af2complexes_interfaces
tbl.interfaces.v2=interfaces_v2

tbl.conserv=conserv_score
tbl.eve=eve_score
tbl.esm=esm
tbl.am=alphamissense
tbl.popeve=popeve
tbl.m3d=m3d

# new data tables
#tbl.allelefreq=allele_freq
#tbl.allelefreq=allele_freq_all_snv
tbl.allelefreq=gnomad_allele_freq

tbl.ann.fun=${tbl.prefix}_function
tbl.ann.fun.feature=${tbl.prefix}_function_feature
tbl.ann.pop=${tbl.prefix}_population
tbl.ann.str=${tbl.prefix}_structure