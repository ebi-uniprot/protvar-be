# Semantic search — embedding model registry
# Controls which models are available in /semantic-search/models.
#
# To activate a model after running slurm/embed:
#   set embedding.models.<key>.enabled=true
#
# Service URLs follow the convention:
#   http://embedding-service-<key>:8000
# Override with embedding.models.<key>.service-url if needed.

embedding.default-model=mpnet

# Shared text table (one per release, model-agnostic)
vector.text.table=rel_2025_01_function_text

# MPNet — QA-optimised retrieval (production default)
embedding.models.mpnet.label=MPNet
embedding.models.mpnet.description=QA-optimised retrieval model, strong for query-to-document matching
embedding.models.mpnet.hf-name=sentence-transformers/multi-qa-mpnet-base-dot-v1
embedding.models.mpnet.dim=768
embedding.models.mpnet.enabled=true
embedding.models.mpnet.service-url=http://embedding-service-mpnet:8000

# MiniLM — fast, lightweight baseline
embedding.models.minilm.label=MiniLM
embedding.models.minilm.description=Fast, lightweight baseline model
embedding.models.minilm.hf-name=sentence-transformers/all-MiniLM-L6-v2
embedding.models.minilm.dim=384
embedding.models.minilm.enabled=true
embedding.models.minilm.service-url=http://embedding-service-minilm:8000

# BioBERT — biomedical NLI
embedding.models.biobert.label=BioBERT
embedding.models.biobert.description=Biomedical NLI model, strong on disease and function descriptions
embedding.models.biobert.hf-name=pritamdeka/BioBERT-mnli-snli-scinli-scitail-mednli-stsb
embedding.models.biobert.dim=768
embedding.models.biobert.enabled=true
embedding.models.biobert.service-url=http://embedding-service-biobert:8000

# BioLORD — enable after running slurm/embed
embedding.models.biolord.label=BioLORD
embedding.models.biolord.description=Biomedical ontology-aware model (SNOMED CT, HPO), strong for phenotype-to-protein retrieval
embedding.models.biolord.hf-name=FremyCompany/BioLORD-2023
embedding.models.biolord.dim=768
embedding.models.biolord.enabled=false
embedding.models.biolord.service-url=http://embedding-service-biolord:8000

# BGE — enable after running slurm/embed
embedding.models.bge.label=BGE
embedding.models.bge.description=State-of-the-art general retrieval model (top MTEB)
embedding.models.bge.hf-name=BAAI/bge-base-en-v1.5
embedding.models.bge.dim=768
embedding.models.bge.enabled=false
embedding.models.bge.service-url=http://embedding-service-bge:8000

# SPECTER2 — enable after running slurm/embed
embedding.models.specter2.label=SPECTER2
embedding.models.specter2.description=Scientific literature embeddings, strong on paper abstracts and biomedical text
embedding.models.specter2.hf-name=allenai/specter2
embedding.models.specter2.dim=768
embedding.models.specter2.enabled=false
embedding.models.specter2.service-url=http://embedding-service-specter2:8000
